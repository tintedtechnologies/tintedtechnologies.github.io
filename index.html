<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tinted Technologies | AI, Cloud & Technical Training</title>

    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="Tinted Technologies provides practical AI, cloud, automation, and technical training for teams, small businesses, and professionals." />
    <meta name="keywords" content="technical training, AI training, cloud training, AI workshops, cloud workshops, automation training, tech mentorship, career strategy, skill development, corporate technology training, small business technology, Tinted Technologies" />
    <meta name="author" content="Tinted Technologies LLC" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="English" />
    <meta name="theme-color" content="#6D5DF6" />
    <link rel="canonical" href="https://tintedtechnologies.com/" />
    <link rel="me" href="https://www.instagram.com/tintedtechnologies/" />

    <!-- Theme flash prevention: set data-theme before React renders -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.setAttribute('data-theme', saved);
          }
        } catch (e) {}
      })();
    </script>

    <!-- Open Graph / Facebook / LinkedIn / iMessage -->
    <meta property="og:title" content="Tinted Technologies | AI, Cloud & Technical Training" />
    <meta property="og:description" content="Practical AI, cloud, automation, and technical training for teams, small businesses, and professionals." />
    <meta property="og:url" content="https://tintedtechnologies.com/" />
    <meta property="og:site_name" content="Tinted Technologies" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://tintedtechnologies.com/og-image.png" />
    <meta property="og:image:alt" content="Tinted Technologies AI, cloud, and technical training" />
    <meta property="og:locale" content="en_US" />

    <!-- Business Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Tinted Technologies LLC",
      "url": "https://tintedtechnologies.com/",
      "description": "Tinted Technologies provides technical training, AI and cloud workshops, mentorship, and skill development for teams, small businesses, and professionals.",
      "areaServed": "United States",
      "serviceType": [
        "Technical Training",
        "AI Training",
        "Cloud Training",
        "Automation Training",
        "Career Mentorship",
        "Corporate Workshops",
        "Technology Skill Development"
      ],
      "sameAs": [
        "https://www.instagram.com/tintedtechnologies/"
      ],
      "brand": {
        "@type": "Brand",
        "name": "Tinted Technologies"
      }
    }
    </script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- GitHub Pages SPA redirect handling -->
    <script type="text/javascript">
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.pathname) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
